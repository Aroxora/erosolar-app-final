name: Erosolar
options:
  bundleIdPrefix: com.erosolar
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"
targets:
  Erosolar:
    type: application
    platform: iOS
    sources:
      - path: Erosolar/Sources
      - path: Erosolar/Resources
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.erosolar.Erosolar
        PRODUCT_NAME: Erosolar
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Erosolar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
